services:
  backend:
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
  
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      target: build-stage
    working_dir: /app
    volumes:
      - ./app/frontend:/app
      - /app/node_modules
    ports:
      - "8080:5173"
    command: sh -c "npm install && npm run dev -- --host"
