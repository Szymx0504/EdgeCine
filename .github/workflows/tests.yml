name: EdgeCine CI (Neural Tests)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Optional: Start a real Postgres for deeper integration tests
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: movie_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Health check to ensure postgres is up before starting tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --extra-index-url https://download.pytorch.org/whl/cpu torch
        pip install -r requirements.txt
        pip install pytest httpx

    - name: Run Tests
      env:
        # Pass dummy env vars for testing environment
        DB_HOST: localhost
        DB_NAME: movie_db
        DB_USER: user
        DB_PASSWORD: password
        DB_PORT: 5432
        ONNX_VARIANT: FP32
        PYTHONPATH: ${{ github.workspace }}/app
      run: |
        # We skip neural tests if models aren't committed to Git LFS/Git
        # But according to our state, we added them.
        pytest app/backend/tests/
